<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קפה דאדא | השארת פרטים</title>

  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: "Heebo", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f7f3ed, #ffffff);
      color: #231f20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.10);
    }

    .logo {
      display: block;
      max-width: 220px;
      margin: 0 auto 18px;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 30px;
      line-height: 1.2;
      color: #2b1d14;
    }

    .subtitle {
      text-align: center;
      margin: 8px 0 26px;
      color: #6b5b4f;
      font-size: 17px;
      font-weight: 500;
    }

    .section-title {
      font-weight: 800;
      margin: 20px 0 10px;
      color: #2b1d14;
      font-size: 17px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #3b3028;
    }

    input {
      width: 100%;
      border: 1px solid #ddd2c7;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      background: #fffdfb;
      margin-bottom: 13px;
    }

    input:focus {
      border-color: #8b5e3c;
      box-shadow: 0 0 0 3px rgba(139,94,60,0.12);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 15px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      background: #2b1d14;
      color: white;
      transition: 0.2s;
      margin-top: 8px;
    }

    button:hover {
      transform: translateY(-1px);
      background: #3a281d;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .success {
      display: none;
      text-align: center;
      padding: 30px 10px;
    }

    .success h2 {
      font-size: 38px;
      margin: 20px 0 10px;
      color: #2b1d14;
    }

    .success p {
      font-size: 18px;
      color: #6b5b4f;
      margin: 0;
    }

    .error {
      display: none;
      color: #b00020;
      text-align: center;
      margin-top: 12px;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="logo.png" class="logo" alt="קפה דאדא">

    <div id="formWrap">
      <h1>קפה דאדא לעסקים</h1>
      <div class="subtitle">קפה פרימיום אצלכם במשרד</div>

      <form id="leadForm">
        <div class="section-title">פרטי איש קשר</div>

        <label>שם מלא *</label>
        <input name="fullName" required>

        <label>חברה *</label>
        <input name="company" required>

        <label>תפקיד *</label>
        <input name="position" required>

        <label>טלפון *</label>
        <input name="phone" type="tel" required>

        <label>מיקום המשרדים *</label>
        <input name="officeLocation" required>

        <label>מספר עובדים *</label>
        <input name="employees" type="number" required>

        <button id="submitBtn" type="submit">שלחו פרטים</button>
        <div class="error" id="errorMsg">אירעה תקלה בשליחה. נסו שוב.</div>
      </form>
    </div>

    <div class="success" id="successMsg">
      <h2>תודה!</h2>
      <p>קיבלנו את הפרטים וניצור קשר בהקדם.</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJAmx902CLNFriHxKql8gGzCdYH6ZFVis",
      authDomain: "suppliers-leads.firebaseapp.com",
      databaseURL: "https://suppliers-leads-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "suppliers-leads",
      storageBucket: "suppliers-leads.firebasestorage.app",
      messagingSenderId: "723769615013",
      appId: "1:723769615013:web:a1591e720b509c379de34c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const form = document.getElementById("leadForm");
    const formWrap = document.getElementById("formWrap");
    const successMsg = document.getElementById("successMsg");
    const errorMsg = document.getElementById("errorMsg");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.textContent = "שולח...";

      const formData = new FormData(form);

      const lead = {
        fullName: formData.get("fullName") || "",
        company: formData.get("company") || "",
        position: formData.get("position") || "",
        phone: formData.get("phone") || "",
        officeLocation: formData.get("officeLocation") || "",
        employees: formData.get("employees") || "",
        status: "חדש",
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      };

      try {
        await push(ref(db, "supplierLeads"), lead);
        formWrap.style.display = "none";
        successMsg.style.display = "block";
      } catch (err) {
        console.error(err);
        errorMsg.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "שלחו פרטים";
      }
    });
  </script>
</body>
</html>
